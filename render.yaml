services:
  - type: web
    name: presseportal
    runtime: static
    buildCommand: "sed -i 's|__API_KEY__|'\"$API_KEY\"'|g' index.html"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    envVars:
      - key: API_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
